<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛠️ Pizarrón AI — Dev Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808; --surface: #111; --surface2: #181818; --surface3: #1f1f1f;
      --border: #252525; --text: #e8e8e8; --muted: #555; --muted2: #888;
      --green: #00e676; --yellow: #ffd600; --red: #ff3d3d;
      --orange: #ff7043; --blue: #40a9ff; --purple: #b57bee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 3px; color: var(--orange); }
    .topbar-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .topbar-right { display: flex; gap: 10px; align-items: center; }

    /* ── LAYOUT ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2,1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-family: 'Bebas Neue'; font-size: 36px; letter-spacing: 1px; }
    .stat-delta { font-size: 11px; color: var(--muted2); margin-top: 2px; }
    .c-green { color: var(--green); } .c-yellow { color: var(--yellow); }
    .c-red { color: var(--red); } .c-orange { color: var(--orange); }
    .c-blue { color: var(--blue); } .c-purple { color: var(--purple); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
    .filter-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .search-input {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-left: auto;
      width: 200px;
    }
    .search-input:focus { border-color: var(--orange); }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted2);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); cursor: pointer; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-nuevo    { background: rgba(64,169,255,0.15); color: var(--blue);   border: 1px solid rgba(64,169,255,0.3); }
    .badge-revisando{ background: rgba(255,214,0,0.15);  color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
    .badge-resuelto { background: rgba(0,230,118,0.15);  color: var(--green);  border: 1px solid rgba(0,230,118,0.3); }
    .badge-cerrado  { background: rgba(100,100,100,0.15);color: var(--muted2); border: 1px solid var(--border); }
    .badge-critica  { background: rgba(255,61,61,0.15);  color: var(--red);    border: 1px solid rgba(255,61,61,0.3); }
    .badge-alta     { background: rgba(255,112,67,0.15); color: var(--orange); border: 1px solid rgba(255,112,67,0.3); }
    .badge-media    { background: rgba(255,214,0,0.12);  color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
    .badge-baja     { background: rgba(0,230,118,0.12);  color: var(--green);  border: 1px solid rgba(0,230,118,0.3); }

    /* cat icons */
    .cat-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--muted2);
    }

    /* ── DETAIL DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: min(480px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding: 24px;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .drawer-ticket {
      font-family: 'Bebas Neue';
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--orange);
    }
    .close-drawer {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .detail-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted2);
      min-width: 90px;
      padding-top: 2px;
    }
    .detail-value { font-size: 13px; color: var(--text); flex: 1; line-height: 1.6; }

    .desc-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
    }

    .meta-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .meta-block .meta-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted2); margin-bottom: 8px; }
    .meta-line { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
    .meta-line span:first-child { color: var(--muted2); }
    .meta-line span:last-child { color: var(--text); font-family: monospace; font-size: 10px; }

    /* Status control */
    .status-control { margin-top: 20px; }
    .status-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted2); margin-bottom: 8px; }
    .status-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-btn {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .status-btn:hover { border-color: var(--blue); color: var(--blue); }
    .status-btn.active-nuevo     { border-color: var(--blue);   color: var(--blue);   background: rgba(64,169,255,0.1); }
    .status-btn.active-revisando { border-color: var(--yellow); color: var(--yellow); background: rgba(255,214,0,0.1); }
    .status-btn.active-resuelto  { border-color: var(--green);  color: var(--green);  background: rgba(0,230,118,0.1); }
    .status-btn.active-cerrado   { border-color: var(--muted2); color: var(--muted2); background: rgba(100,100,100,0.1); }

    .note-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      resize: none;
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .note-input:focus { border-color: var(--blue); }

    .action-btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .btn-save { background: var(--blue); color: #fff; }
    .btn-save:hover { filter: brightness(1.15); }
    .btn-del { background: transparent; border-color: var(--border); color: var(--muted2); }
    .btn-del:hover { border-color: var(--red); color: var(--red); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted2); }
    .empty-state .big { font-size: 42px; margin-bottom: 12px; }

    /* ── REFRESH BTN ── */
    .refresh-btn {
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted2);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── LOADING ROW ── */
    .skeleton-row td { opacity: 0.3; }
  </style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-logo">⚽ PIZARRÓN AI</div>
    <div class="topbar-sub">🛠️ Dashboard de mantenimiento</div>
  </div>
  <div class="topbar-right">
    <button class="refresh-btn" onclick="loadReports()">
      <span id="refresh-icon">↻</span> Actualizar
    </button>
  </div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total reportes</div><div class="stat-value c-orange" id="st-total">—</div><div class="stat-delta" id="st-total-d"></div></div>
    <div class="stat-card"><div class="stat-label">Sin revisar</div><div class="stat-value c-blue" id="st-nuevos">—</div><div class="stat-delta">estado: nuevo</div></div>
    <div class="stat-card"><div class="stat-label">Críticos</div><div class="stat-value c-red" id="st-criticos">—</div><div class="stat-delta">requieren atención urgente</div></div>
    <div class="stat-card"><div class="stat-label">Resueltos</div><div class="stat-value c-green" id="st-resueltos">—</div><div class="stat-delta" id="st-resueltos-d"></div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('nuevo',this)">🔵 Nuevos</button>
    <button class="filter-btn" onclick="setFilter('revisando',this)">🟡 Revisando</button>
    <button class="filter-btn" onclick="setFilter('resuelto',this)">🟢 Resueltos</button>
    <button class="filter-btn" onclick="setFilter('critica',this)">🔴 Críticos</button>
    <input class="search-input" type="text" placeholder="🔍 Buscar..." id="searchInput" oninput="renderTable()">
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticket</th>
          <th>Categoría</th>
          <th>Severidad</th>
          <th>Descripción</th>
          <th>Grupo</th>
          <th>Estado</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="reportTable">
        <tr class="skeleton-row">
          <td>—</td><td>—</td><td>—</td><td>Cargando reportes...</td><td>—</td><td>—</td><td>—</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- DETAIL DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawerPanel"></div>

<script>
  // ─── CONFIG ── Replace with your Supabase credentials ───
  const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
  const SUPABASE_KEY  = 'YOUR_SERVICE_ROLE_KEY'; // use service role for admin dashboard

  let allReports = [];
  let activeFilter = 'todos';

  const CAT_ICONS = {
    sync: '☁️', equipos: '⚖️', votos: '⭐', visual: '🎨',
    performance: '🐌', otro: '💬'
  };
  const CAT_LABELS = {
    sync: 'Sincronización', equipos: 'Equipos/Balanceo', votos: 'Votación',
    visual: 'Visual/UI', performance: 'Lentitud', otro: 'Otro/Sugerencia'
  };

  async function supabaseGet(query = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/bug_reports?${query}&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function supabasePatch(id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/bug_reports?ticket_id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
  }

  async function loadReports() {
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('spinning');
    try {
      allReports = await supabaseGet('select=*');
      updateStats();
      renderTable();
    } catch(e) {
      console.error(e);
      // Demo data when not connected
      allReports = DEMO_DATA;
      updateStats();
      renderTable();
    }
    icon.classList.remove('spinning');
  }

  function updateStats() {
    document.getElementById('st-total').textContent     = allReports.length;
    document.getElementById('st-nuevos').textContent    = allReports.filter(r => r.estado === 'nuevo').length;
    document.getElementById('st-criticos').textContent  = allReports.filter(r => r.severidad === 'critica').length;
    document.getElementById('st-resueltos').textContent = allReports.filter(r => r.estado === 'resuelto').length;
    const pct = allReports.length > 0
      ? Math.round(allReports.filter(r=>r.estado==='resuelto').length/allReports.length*100) : 0;
    document.getElementById('st-resueltos-d').textContent = pct + '% del total';
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let rows = allReports.filter(r => {
      if (activeFilter === 'todos') return true;
      if (activeFilter === 'critica') return r.severidad === 'critica';
      return r.estado === activeFilter;
    }).filter(r =>
      !search || r.descripcion?.toLowerCase().includes(search) ||
      r.ticket_id?.toLowerCase().includes(search) ||
      r.grupo_id?.toLowerCase().includes(search)
    );

    const tbody = document.getElementById('reportTable');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="big">📭</div>Sin reportes en esta categoría</div></td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr onclick="openDrawer(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <td><span style="font-family:'Bebas Neue';letter-spacing:2px;color:var(--orange);font-size:14px">${r.ticket_id}</span></td>
        <td><span class="cat-chip">${CAT_ICONS[r.categoria]||'❓'} ${CAT_LABELS[r.categoria]||r.categoria}</span></td>
        <td><span class="badge badge-${r.severidad}">${sevEmoji(r.severidad)} ${r.severidad}</span></td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted2)">${r.descripcion||'—'}</td>
        <td><span style="font-family:monospace;font-size:11px;color:var(--muted2)">${r.grupo_id||'—'}</span></td>
        <td><span class="badge badge-${r.estado}">${r.estado}</span></td>
        <td style="color:var(--muted2);font-size:11px">${fmtDate(r.created_at)}</td>
      </tr>
    `).join('');
  }

  function openDrawer(r) {
    const panel = document.getElementById('drawerPanel');
    panel.innerHTML = `
      <div class="drawer-header">
        <div>
          <div class="drawer-ticket">${r.ticket_id}</div>
          <div style="font-size:11px;color:var(--muted2);margin-top:2px">${fmtDate(r.created_at)} · ${r.grupo_id}</div>
        </div>
        <button class="close-drawer" onclick="closeDrawer()">✕</button>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
        <span class="badge badge-${r.severidad}">${sevEmoji(r.severidad)} ${r.severidad}</span>
        <span class="badge badge-${r.estado}">${r.estado}</span>
        <span class="cat-chip" style="background:var(--surface2);padding:3px 9px;border-radius:20px;border:1px solid var(--border)">
          ${CAT_ICONS[r.categoria]||'❓'} ${CAT_LABELS[r.categoria]||r.categoria}
        </span>
      </div>

      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:8px">Descripción</div>
      <div class="desc-box">${r.descripcion || '(sin descripción)'}</div>

      ${r.pasos ? `
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:8px">Pasos para reproducir</div>
        <div class="desc-box" style="white-space:pre-line">${r.pasos}</div>
      ` : ''}

      <div class="meta-block">
        <div class="meta-title">Contexto técnico</div>
        <div class="meta-line"><span>Dispositivo</span><span>${parseUA(r.user_agent)}</span></div>
        <div class="meta-line"><span>Viewport</span><span>${r.viewport||'—'}</span></div>
        <div class="meta-line"><span>URL</span><span style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${r.url_actual||'—'}</span></div>
        <div class="meta-line"><span>Timestamp</span><span>${r.timestamp||r.created_at||'—'}</span></div>
      </div>

      <div class="status-control">
        <div class="status-label">Cambiar estado</div>
        <div class="status-btns">
          ${['nuevo','revisando','resuelto','cerrado'].map(s=>
            `<button class="status-btn ${r.estado===s?'active-'+s:''}" onclick="changeStatus('${r.ticket_id}','${s}',this)">${statusEmoji(s)} ${s}</button>`
          ).join('')}
        </div>

        <textarea class="note-input" rows="3" placeholder="Nota interna (solo visible para el dev)..." id="noteInput">${r.nota_dev||''}</textarea>
        <div style="display:flex;gap:8px">
          <button class="action-btn btn-save" onclick="saveNote('${r.ticket_id}')">💾 Guardar nota</button>
          <button class="action-btn btn-del" onclick="deleteReport('${r.ticket_id}')">🗑️ Eliminar</button>
        </div>
      </div>
    `;
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawerPanel').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('drawerPanel').classList.remove('open');
  }

  async function changeStatus(ticketId, newStatus, el) {
    try {
      await supabasePatch(ticketId, { estado: newStatus });
      const r = allReports.find(x => x.ticket_id === ticketId);
      if (r) r.estado = newStatus;
      el.closest('.status-btns').querySelectorAll('.status-btn').forEach(b => {
        b.className = 'status-btn';
      });
      el.classList.add('active-' + newStatus);
      updateStats();
      renderTable();
    } catch(e) { alert('Error: ' + e.message); }
  }

  async function saveNote(ticketId) {
    const nota = document.getElementById('noteInput').value;
    try {
      await supabasePatch(ticketId, { nota_dev: nota, updated_at: new Date().toISOString() });
      const r = allReports.find(x => x.ticket_id === ticketId);
      if (r) r.nota_dev = nota;
      // flash feedback
      const btn = event.target;
      btn.textContent = '✅ Guardado'; btn.style.background = 'var(--green)';
      setTimeout(() => { btn.textContent = '💾 Guardar nota'; btn.style.background = ''; }, 2000);
    } catch(e) { alert('Error: ' + e.message); }
  }

  async function deleteReport(ticketId) {
    if (!confirm(`¿Eliminar el reporte ${ticketId}? Esta acción no se puede deshacer.`)) return;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/bug_reports?ticket_id=eq.${ticketId}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      allReports = allReports.filter(r => r.ticket_id !== ticketId);
      closeDrawer();
      updateStats();
      renderTable();
    } catch(e) { alert('Error: ' + e.message); }
  }

  // ─── HELPERS ───
  function sevEmoji(s) { return {baja:'😐',media:'⚠️',alta:'🔥',critica:'💀'}[s]||''; }
  function statusEmoji(s) { return {nuevo:'🔵',revisando:'🟡',resuelto:'🟢',cerrado:'⚫'}[s]||''; }
  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) + ' ' +
           dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  }
  function parseUA(ua) {
    if (!ua) return '—';
    if (/iPhone/.test(ua)) return '📱 iPhone';
    if (/Android/.test(ua)) return '📱 Android';
    if (/iPad/.test(ua)) return '📱 iPad';
    if (/Mac/.test(ua)) return '💻 Mac';
    if (/Windows/.test(ua)) return '🖥️ Windows';
    return '🌐 Otro';
  }
